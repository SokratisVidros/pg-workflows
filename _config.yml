title: pg-workflows
description: The simplest Postgres workflow engine for TypeScript. Durable execution, event-driven orchestration, and automatic retries - powered entirely by PostgreSQL.
theme: jekyll-theme-cayman
show_downloads: false

# Make relative [text](docs/foo.md) links resolve to rendered .html on Pages
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Include docs/*.md files as Pages
include:
  - docs

# Exclude non-docs files from the build
exclude:
  - node_modules
  - examples/node_modules
  - src
  - dist
  - tests
  - bun.lock
  - package-lock.json
  - package.json
  - tsconfig.json
  - bunup.config.ts
  - biome.json
  - CLAUDE.md
  - AGENTS.md
  - GEMINI.md
  - .clinerules
  - .cursorrules
  - .windsurfrules
  - .eslintignore
  - .biomeignore
  - .env.local
